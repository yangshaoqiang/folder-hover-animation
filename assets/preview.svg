<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="700" y1="60" x2="700" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#D9E8FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(700 260) rotate(90) scale(320 520)">
      <stop stop-color="white" stop-opacity="0.95"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="980" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#18418A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1400" height="980" rx="36" fill="url(#bg)"/>
  <rect width="1400" height="980" rx="36" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <g transform="translate(210 70)">
      <image href="./第一层.png" width="980" height="900" />
      <image href="./第二层.png" width="931" height="855" transform="translate(24 -44) scale(0.95)" />
      <image href="./第三层.png" width="956" height="877.5" transform="translate(12 -22) scale(0.975)" />
      <image href="./第四层.png" width="980" height="900" transform="translate(0 -8) rotate(-18 490 900)" />
    </g>
  </g>
</svg>
